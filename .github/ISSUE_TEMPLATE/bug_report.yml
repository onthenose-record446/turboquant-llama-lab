name: Bug report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include exact commands, model, and profile.
      placeholder: |
        Model:
        Hardware:
        Command:
        Expected:
        Actual:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant benchmark or runtime output.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: GPU, driver, OS, compiler, and backend details.

